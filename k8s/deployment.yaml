apiVersion: apps/v1
kind: Deployment
metadata:
  name: alma-mcp
  labels:
    app.kubernetes.io/name: alma-mcp
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: alma-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alma-mcp
    spec:
      imagePullSecrets:
        - name: alma-mcp-registry
      containers:
        - name: alma-mcp
          image: alma-mcp:local
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: alma-mcp-config
            - secretRef:
                name: alma-mcp-secret
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
